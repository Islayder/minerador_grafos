# Repositorio alvo da mineracao (organizacao/nome no GitHub)
github.owner=giscus
github.repository=giscus

# FULL_REPOSITORY = minera o repositorio inteiro (sem amostragem artificial).
# Issues, PRs, comentarios e reviews sao paginados ate pagina vazia ou fim da paginacao.
github.collection.mode=FULL_REPOSITORY

# Tamanho de pagina na GitHub REST API (per_page). Valor maximo usual: 100.
github.collection.perPage=100

# Threads paralelas para buscar comentarios/reviews por issue ou PR (controlado).
# 4 = mais seguro | 6 = equilibrio recomendado | 8 = mais agressivo (risco de limite secundario)
github.collection.concurrency=6

# Cache local em cache/github/ (hash da URL, sem token). true = reutiliza JSON ja baixado.
github.collection.cacheEnabled=true

# Descricao exibida na CLI/desktop (sem token; token fica em .env ou GITHUB_TOKEN).
github.collection.description=Minera o repositorio inteiro giscus/giscus com paginacao ate o fim. Com cache ativo, reexecucoes usam cache/github/ quando a URL ja foi consultada.
